(function(){var o=console,l=['log','warn','error','info','debug'];l.forEach(function(m){var f=o[m];o[m]=function(){var a=Array.from(arguments).map(function(v){try{return typeof v==='object'?JSON.stringify(v):String(v)}catch(e){return String(v)}});try{window.parent.postMessage({type:'console-log',level:m,args:a,timestamp:new Date().toISOString()},'*')}catch(e){}f.apply(o,arguments)}});window.addEventListener('error',function(e){try{window.parent.postMessage({type:'console-log',level:'error',args:['Uncaught: '+e.message+' at '+e.filename+':'+e.lineno],timestamp:new Date().toISOString()},'*')}catch(x){}});window.addEventListener('unhandledrejection',function(e){try{window.parent.postMessage({type:'console-log',level:'error',args:['Unhandled Promise: '+String(e.reason)],timestamp:new Date().toISOString()},'*')}catch(x){}})})();
</script>
